<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫學刷題中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #333; padding-bottom: 50px; }
        .quiz-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .category-tag { background: #e7f1ff; color: #0d6efd; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .option { display: block; padding: 12px; margin: 8px 0; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f1f3f5; border-color: #adb5bd; }
        .result { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; }
        .correct { background-color: #d1e7dd; color: #0f5132; }
        .wrong { background-color: #f8d7da; color: #842029; }
        .explanation { font-weight: normal; font-size: 0.9rem; margin-top: 8px; color: #495057; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <h1 class="text-center fw-bold text-primary mb-4">📝 醫學刷題中心</h1>
            
            <div class="card p-4 shadow-sm mb-4">
                <label class="form-label fw-bold">選擇科目進行測驗：</label>
                <select id="category-select" class="form-select form-select-lg" onchange="loadQuestions()">
                    <option value="">全部科目</option>
                </select>
            </div>

            <div id="quiz-container"></div>
            
            <div class="d-grid mt-4">
                <button class="btn btn-primary btn-lg shadow" onclick="submitAllAnswers()">送出答案並批改喔</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'https://jimmyishandsomeboy.onrender.com/api';

    async function loadCategories() {
        try {
            const response = await fetch(`${BASE_URL}/categories`, { mode: 'cors' });
            const categories = await response.json();
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                if (cat) {
                    select.innerHTML += `<option value="${cat}">${cat}</option>`;
                }
            });
        } catch (error) { console.error('無法載入分類：', error); }
    }

    async function loadQuestions() {
        try {
            const selectedCategory = document.getElementById('category-select').value;
            const response = await fetch(`${BASE_URL}/questions?category=${selectedCategory}`);
            const questions = await response.json();
            const container = document.getElementById('quiz-container');
            container.innerHTML = ''; 

            if (questions.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">目前沒有題目喔！</p>';
                return;
            }

            questions.forEach((q, index) => {
                container.innerHTML += `
                    <div class="quiz-card" id="card-${q.id}">
                        <span class="category-tag">${q.category}</span>
                        <div class="fw-bold fs-5 my-2">Q${index + 1}. ${q.question}</div>
                        <label class="option"><input type="radio" name="q-${q.id}" value="A" class="me-2"> A. ${q.option_a}</label>
                        <label class="option"><input type="radio" name="q-${q.id}" value="B" class="me-2"> B. ${q.option_b}</label>
                        <label class="option"><input type="radio" name="q-${q.id}" value="C" class="me-2"> C. ${q.option_c}</label>
                        <label class="option"><input type="radio" name="q-${q.id}" value="D" class="me-2"> D. ${q.option_d}</label>
                        <div class="result" id="result-${q.id}"></div>
                    </div>
                `;
            });
        } catch (error) { alert('無法連線到伺服器，請稍候！'); }
    }

    async function submitAllAnswers() {
        const cards = document.querySelectorAll('.quiz-card');
        for (let card of cards) {
            const qId = card.id.split('-')[1];
            const selectedOption = document.querySelector(`input[name="q-${qId}"]:checked`);
            if (!selectedOption) { alert('還有題目沒寫完喔！'); return; }

            const response = await fetch(`${BASE_URL}/submit?question_id=${qId}&user_choice=${selectedOption.value}`, { method: 'POST' });
            const result = await response.json();
            const resultDiv = document.getElementById(`result-${qId}`);
            resultDiv.style.display = 'block';
            resultDiv.className = `result ${result.is_correct ? 'correct' : 'wrong'}`;
            resultDiv.innerHTML = `${result.is_correct ? '🎉 答對了！' : '❌ 答錯了！正確答案是 ' + result.correct_answer}<div class="explanation">解析：${result.explanation}</div>`;
        }
    }

    // 初始化
    loadCategories();
    loadQuestions();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
