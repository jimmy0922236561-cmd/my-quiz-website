<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫學系 Block 分類題庫系統</title>
    <style>
        :root {
            --primary-color: #2b5876;
            --secondary-color: #4e4376;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }
        /* 隱藏區塊用的 CSS */
        .hidden {
            display: none !important;
        }
        /* 考卷選擇大廳樣式 */
        .quiz-lobby {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            .quiz-lobby { grid-template-columns: 1fr; }
        }
        .lobby-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 30px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .lobby-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        /* 測驗區域與回首頁按鈕 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }
        .quiz-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-label {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-label:hover {
            background-color: #f0f4f8;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby-view">
        <h1>醫學系 Block 考古題庫</h1>
        <h2>請選擇你想挑戰的考卷</h2>
        <div class="quiz-lobby">
            <button class="lobby-btn" data-quiz="Block6_Final">BM113 Block 6 期末考</button>
            <button class="lobby-btn" data-quiz="Block7_Mid">BM113 Block 7 期中考</button>
            <button class="lobby-btn" data-quiz="Block8_Final">BM113 Block 8 期末考</button>
        </div>
    </div>

    <div id="quiz-view" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" id="btn-back">⬅ 回大廳選考卷</button>
            <span id="quiz-title" style="font-weight: bold; color: var(--primary-color);"></span>
        </div>

        <div class="quiz-card">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #777;">
                <span id="q-category">科目分類：載入中...</span>
                <span id="q-progress">題號：0 / 0</span>
            </div>
            <h3 id="q-text" style="margin-top: 15px; line-height: 1.5;">題目載入中...</h3>

            <div class="options-group">
                <label class="option-label"><input type="radio" name="answer" value="A"> <span id="opt-a">選項 A</span></label>
                <label class="option-label"><input type="radio" name="answer" value="B"> <span id="opt-b">選項 B</span></label>
                <label class="option-label"><input type="radio" name="answer" value="C"> <span id="opt-c">選項 C</span></label>
                <label class="option-label"><input type="radio" name="answer" value="D"> <span id="opt-d">選項 D</span></label>
            </div>

            <div id="explanation-box" class="hidden" style="margin: 20px 0; padding: 15px; border-radius: 8px; font-size: 1rem; line-height: 1.5;">
                <strong id="result-status" style="font-size: 1.1rem;"></strong>
                
                <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #444;">📝 詳解 / 我的筆記：</label>
                    <textarea id="explanation-input" rows="4" style="width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #bbb; font-family: inherit;" placeholder="此題目目前尚無筆記或詳解，點此輸入你的心得口訣..."></textarea>
                    <div style="text-align: right; margin-top: 5px;">
                        <button id="btn-save-explanation" style="background-color: #4e4376; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9rem;">💾 儲存修改</button>
                    </div>
                </div>
            </div>
            
            <div style="text-align: right;">
                <button id="btn-submit" style="background-color: #2b5876; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 6px; cursor: pointer;">下一頁 / 送出</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 💡 請將此網址替換成你實際的 Render 後端網址
    const API_BASE_URL = "https://jimmyishandsomeboy.onrender.com"; 

    // 全域變數狀態儲存
    let currentQuizName = "";
    let currentQuestions = [];
    let currentIndex = 0;
    let isShowingResult = false; // 記錄目前是在「看解析」還是「切換下一題」

    // 取得 DOM 節點
    const lobbyView = document.getElementById("lobby-view");
    const quizView = document.getElementById("quiz-view");
    const quizTitle = document.getElementById("quiz-title");
    const qCategory = document.getElementById("q-category");
    const qProgress = document.getElementById("q-progress");
    const qText = document.getElementById("q-text");
    const optA = document.getElementById("opt-a");
    const optB = document.getElementById("opt-b");
    const optC = document.getElementById("opt-c");
    const optD = document.getElementById("opt-d");
    
    // 💡 新增的詳解區塊節點
    const explanationBox = document.getElementById("explanation-box");
    const resultStatus = document.getElementById("result-status");
    const explanationText = document.getElementById("explanation-text");
    const explanationInput = document.getElementById("explanation-input");
    const btnSaveExplanation = document.getElementById("btn-save-explanation");
    // 1. 大廳按鈕點擊事件監聽
    document.querySelectorAll(".lobby-btn").forEach(button => {
        button.addEventListener("click", function() {
            currentQuizName = this.getAttribute("data-quiz");
            const displayName = this.innerText;
            startQuiz(currentQuizName, displayName);
        });
    });

    // 2. 進入測驗模式
    async function startQuiz(quizName, displayName) {
        try {
            quizTitle.innerText = displayName;
            lobbyView.classList.add("hidden");
            quizView.classList.remove("hidden");

            const response = await fetch(`${API_BASE_URL}/api/questions/${quizName}`);
            if (!response.ok) throw new Error("找不到考卷檔案");
            
            currentQuestions = await response.json();
            currentIndex = 0;
            isShowingResult = false;

            if (currentQuestions.length === 0) {
                qText.innerText = "這份考卷目前沒有任何題目喔！";
                return;
            }

            renderQuestion();
        } catch (error) {
            alert("讀取題庫失敗: " + error.message);
            goBackToLobby();
        }
    }

    // 3. 渲染當前題目的函式（含紅綠燈、詳解欄位徹底重置 🚀）
    function renderQuestion() {
        if (currentIndex >= currentQuestions.length) {
            alert("恭喜你寫完全部題目了！");
            goBackToLobby();
            return;
        }

        const q = currentQuestions[currentIndex];
        
        // A. 重置所有單選按鈕狀態與點擊限制
        document.querySelectorAll('input[name="answer"]').forEach(el => {
            el.checked = false;
            el.disabled = false; // 恢復可選
        });

        // B. 徹底清除上一題留下來的紅綠燈背景顏色 🛠️
        document.querySelectorAll('.option-label').forEach(label => {
            label.style.backgroundColor = "";
            label.style.borderColor = "#e0e0e0";
            label.style.pointerEvents = "auto"; // 恢復可點擊狀態
        });

        // C. 隱藏並清空詳解顯示區 🛠️
        explanationBox.classList.add("hidden");
        explanationBox.style.backgroundColor = "";
        explanationBox.style.border = "";
        resultStatus.innerText = "";
        explanationText.innerText = "";
        explanationInput.value = "";

        // D. 更新題目與選項文字
        qCategory.innerText = `科目分類：${q.category}`;
        qProgress.innerText = `題號：${currentIndex + 1} / ${currentQuestions.length}`;
        qText.innerText = q.question;
        optA.innerText = q.option_a;
        optB.innerText = q.option_b;
        optC.innerText = q.option_c;
        optD.innerText = q.option_d;
    }

    // 4. 下一題 / 送出答案 點擊邏輯
    document.getElementById("btn-submit").addEventListener("click", async () => {
        const btn = document.getElementById("btn-submit");

        // 狀態 A：如果目前正在顯示答案與解析，再點擊一次就是「切換到下一題」
        if (isShowingResult) {
            currentIndex++;
            isShowingResult = false;
            btn.innerText = "下一頁 / 送出";
            btn.style.backgroundColor = "#2b5876"; 
            renderQuestion(); // 💡 觸發重置與新題渲染
            return;
        }

        // 狀態 B：答題狀態下點擊「送出答案」
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) {
            alert("請選擇一個答案！");
            return;
        }
        
        const userChoice = selected.value;
        const currentQuestionId = currentQuestions[currentIndex].id;

        try {
            const response = await fetch(`${API_BASE_URL}/api/submit/${currentQuizName}?question_id=${currentQuestionId}&user_choice=${userChoice}`, {
                method: 'POST'
            });

            if (!response.ok) throw new Error("判定答案失敗");
            const result = await response.json();

            // 🎨 紅綠燈反饋：高亮顯示正確答案與錯誤選項
            const labels = document.querySelectorAll('.option-label');
            labels.forEach(label => {
                const radio = label.querySelector('input');
                radio.disabled = true; // 送出後鎖定選項不給改
                label.style.pointerEvents = "none"; // 鎖定點擊
                
                if (radio.value === result.correct_answer) {
                    label.style.backgroundColor = "#d4edda"; // 綠色
                    label.style.borderColor = "#c3e6cb";
                }
                if (radio.checked && !result.is_correct) {
                    label.style.backgroundColor = "#f8d7da"; // 紅色
                    label.style.borderColor = "#f5c6cb";
                }
            });

            // 📺 不用彈窗！直接渲染下方詳解區塊
            explanationBox.classList.remove("hidden");
            if (result.is_correct) {
                explanationBox.style.backgroundColor = "#e8f5e9";
                explanationBox.style.borderLeft = "6px solid #2e7d32";
                resultStatus.innerText = "🎉 答對了！";
                resultStatus.style.color = "#2e7d32";
            } else {
                explanationBox.style.backgroundColor = "#ffebee";
                explanationBox.style.borderLeft = "6px solid #c62828";
                resultStatus.innerText = `❌ 答錯了！正確答案是 [ ${result.correct_answer} ]`;
                resultStatus.style.color = "#c62828";
            }
            
            // 💡 直接把後端的 explanation 帶進輸入框，有舊內容就顯示，沒有就變空白讓使用者輸入
            explanationInput.value = result.explanation || "";

            // 💡 綁定點擊儲存按鈕事件
            btnSaveExplanation.onclick = async () => {
                const updatedText = explanationInput.value;
                try {
                    const saveResponse = await fetch(`${API_BASE_URL}/api/explanation/${currentQuizName}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question_id: currentQuestionId, explanation: updatedText })
                    });
                    if (saveResponse.ok) {
                        alert("🎉 筆記與詳解已同步更新！");
                    } else {
                        alert("儲存失敗");
                    }
                } catch (err) {
                    alert("網路連線錯誤: " + err.message);
                }
            };

            // 轉換按鈕狀態，準備進入下一題
            isShowingResult = true;
            btn.innerText = "下一題 ➡️";
            btn.style.backgroundColor = "#28a745"; 

        } catch (error) {
            alert("送出答案時發生錯誤: " + error.message);
        }
    });

    // 5. 回到大廳
    function goBackToLobby() {
        quizView.classList.add("hidden");
        lobbyView.classList.remove("hidden");
        currentQuestions = [];
    }
    document.getElementById("btn-back").addEventListener("click", goBackToLobby);
</script>

</body>
</html>
